# https://taskfile.dev

version: '3'

vars:
  JAR_FILE: target/waffle-sovler-1.0-SNAPSHOT-jar-with-dependencies.jar

tasks:
  default:
    cmds:
      - task -a
    silent: true
    desc: Lists the available tasks

  clean:
    desc: Clean everything
    cmds:
      - mvn clean

  test:
    desc: Run the tests
    cmds:
      - mvn test

  gen-jar:
    desc: Builds the executable JAR
    cmds:
      - mvn compile assembly:single
    sources:
      - pom.xml
      - src/main/java/**/*.java
      - src/main/kotlin/**/*.kt
    generates:
      - "{{.JAR_FILE}}"

  run:
    deps: [gen-jar]
    desc: Run with `task run`
    cmds:
      - java --enable-native-access=ALL-UNNAMED --class-path {{.JAR_FILE}} waffle.app.AppRunner

  upgrade-list:
    desc: Report on available upgrades
    cmds:
      - mvn versions:display-plugin-updates
      - mvn versions:display-dependency-updates
